<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume Designer — Colleen Sinclair</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles/main.css">
  <link rel="stylesheet" href="/styles/resume.css">
  <link rel="stylesheet" href="/styles/editor.css">
  <link rel="stylesheet" href="/styles/print.css" media="print">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1 class="app-title">Resume Designer</h1>
        <p class="app-subtitle">Create and customize</p>
      </div>
      
      <!-- Variant Manager -->
      <div class="options-section">
        <h3 class="options-title">Resume Variant</h3>
        <div id="variant-manager">
          <!-- Rendered by variantManager.js -->
        </div>
      </div>
      
      <div class="options-section">
        <h3 class="options-title">Color Theme</h3>
        <div class="color-palette-options" id="color-palettes">
          <button class="palette-btn active" data-palette="terracotta" title="Terracotta">
            <span class="palette-preview" style="--p1: #c45c3e; --p2: #2d2a26; --p3: #f4e8e4;"></span>
          </button>
          <button class="palette-btn" data-palette="ocean" title="Ocean">
            <span class="palette-preview" style="--p1: #2563eb; --p2: #1e3a5f; --p3: #e8f0fe;"></span>
          </button>
          <button class="palette-btn" data-palette="forest" title="Forest">
            <span class="palette-preview" style="--p1: #059669; --p2: #1a3c34; --p3: #e6f4f0;"></span>
          </button>
          <button class="palette-btn" data-palette="plum" title="Plum">
            <span class="palette-preview" style="--p1: #7c3aed; --p2: #2d1f47; --p3: #f3e8ff;"></span>
          </button>
          <button class="palette-btn" data-palette="slate" title="Slate">
            <span class="palette-preview" style="--p1: #64748b; --p2: #1e293b; --p3: #f1f5f9;"></span>
          </button>
          <button class="palette-btn" data-palette="rose" title="Rose">
            <span class="palette-preview" style="--p1: #e11d48; --p2: #4a1025; --p3: #fce7f3;"></span>
          </button>
        </div>
      </div>
      
      <div class="options-section">
        <h3 class="options-title">Layout</h3>
        <div class="layout-options" id="layout-options">
          <button class="layout-btn active" data-layout="sidebar" title="Sidebar layout">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="3" y="3" width="7" height="18" rx="1"/>
              <rect x="12" y="3" width="9" height="18" rx="1"/>
            </svg>
            <span>Sidebar</span>
          </button>
          <button class="layout-btn" data-layout="stacked" title="Stacked layout">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="3" y="3" width="18" height="5" rx="1"/>
              <rect x="3" y="10" width="18" height="5" rx="1"/>
              <rect x="3" y="17" width="18" height="4" rx="1"/>
            </svg>
            <span>Stacked</span>
          </button>
        </div>
      </div>
      
      <div class="export-controls">
        <button class="btn btn-primary" id="download-pdf">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Download PDF
        </button>
        <button class="btn btn-secondary" id="print-resume">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="6 9 6 2 18 2 18 9"/>
            <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
            <rect x="6" y="14" width="12" height="8"/>
          </svg>
          Print
        </button>
      </div>
    </aside>
    
    <main class="preview-area">
      <div class="resume-container" id="resume-container">
        <div class="resume" id="resume">
          <!-- Resume content rendered here -->
        </div>
      </div>
      
      <!-- Edit mode indicator -->
      <div class="edit-mode-hint" id="edit-hint">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>
        </svg>
        Click any text to edit
      </div>
    </main>
    
    <!-- Structure Panel (collapsible) -->
    <aside class="structure-panel" id="structure-panel">
      <div class="structure-panel-header">
        <h2 class="structure-panel-title">Edit Structure</h2>
        <button class="structure-panel-close" id="close-structure-panel" title="Close panel">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="structure-panel-content" id="structure-panel-content">
        <!-- Rendered by structurePanel.js -->
      </div>
    </aside>
    
    <!-- Toggle button for structure panel -->
    <button class="structure-panel-toggle" id="toggle-structure-panel" title="Edit structure">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <line x1="9" y1="3" x2="9" y2="21"/>
        <line x1="9" y1="9" x2="21" y2="9"/>
        <line x1="9" y1="15" x2="21" y2="15"/>
      </svg>
    </button>
  </div>
  
  <script type="module" src="/src/main.js"></script>
</body>
</html>
