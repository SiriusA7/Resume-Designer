name: Release Desktop App

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  prepare:
    permissions:
      contents: read
      models: read
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      previous_tag: ${{ steps.version.outputs.previous_tag }}
      notes_provider: ${{ steps.final_notes.outputs.provider }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Compute release version
        id: version
        run: node resume-designer/scripts/ci/compute-version.mjs >> "$GITHUB_OUTPUT"

      - name: Generate baseline GitHub release notes
        uses: actions/github-script@v7
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          PREVIOUS_TAG: ${{ steps.version.outputs.previous_tag }}
        with:
          script: |
            const fs = require('node:fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = process.env.RELEASE_TAG;
            const previousTag = process.env.PREVIOUS_TAG;
            const params = {
              owner,
              repo,
              tag_name: tag,
              target_commitish: context.sha
            };

            if (previousTag) {
              params.previous_tag_name = previousTag;
            }

            const { data } = await github.rest.repos.generateReleaseNotes(params);
            const header = `# Resume Designer ${process.env.RELEASE_VERSION}\n\n`;
            fs.writeFileSync('release-notes-baseline.md', `${header}${(data.body || '').trim()}\n`);

      - name: Build AI prompt
        run: |
          {
            echo "Rewrite the following GitHub-generated release notes for end users of the Resume Designer desktop app."
            echo
            echo "Requirements:"
            echo "- Keep Markdown formatting."
            echo "- Be concise and user-facing."
            echo "- Keep sections in this order when relevant: Highlights, Improvements, Fixes."
            echo "- Do not include internal engineering details, branch names, or token/CI references."
            echo "- Preserve technical accuracy. If baseline notes are already clear, keep close wording."
            echo
            echo "Release version: ${{ steps.version.outputs.version }}"
            echo "Release tag: ${{ steps.version.outputs.tag }}"
            echo
            echo "Baseline notes start below:"
            echo
            cat release-notes-baseline.md
          } > release-notes-ai-prompt.txt

      - name: Rewrite notes with GitHub Models (optional)
        id: ai_notes
        continue-on-error: true
        uses: actions/ai-inference@v1
        with:
          prompt-file: ./release-notes-ai-prompt.txt
          model: openai/gpt-4o

      - name: Select final release notes
        id: final_notes
        env:
          AI_RESPONSE_FILE: ${{ steps.ai_notes.outputs.response-file }}
        run: |
          if [ -n "$AI_RESPONSE_FILE" ] && [ -s "$AI_RESPONSE_FILE" ]; then
            cp "$AI_RESPONSE_FILE" release-notes.md
            echo "provider=github-models" >> "$GITHUB_OUTPUT"
          else
            cp release-notes-baseline.md release-notes.md
            echo "provider=github" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload release notes artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: |
            release-notes.md
            release-notes-baseline.md

  build-macos:
    permissions:
      contents: read
    runs-on: macos-latest
    needs: prepare
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: resume-designer/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: resume-designer

      - name: Apply CI release version
        run: npm version "${{ needs.prepare.outputs.version }}" --no-git-tag-version
        working-directory: resume-designer

      - name: Build macOS artifacts
        run: npm run electron:build:mac
        working-directory: resume-designer
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: resume-designer/release/**/*
          if-no-files-found: error

  build-windows:
    permissions:
      contents: read
    runs-on: windows-latest
    needs: prepare
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: resume-designer/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: resume-designer

      - name: Apply CI release version
        run: npm version "${{ needs.prepare.outputs.version }}" --no-git-tag-version
        working-directory: resume-designer

      - name: Build Windows artifacts
        run: npm run electron:build:win
        working-directory: resume-designer

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: resume-designer/release/**/*
          if-no-files-found: error

  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build-macos
      - build-windows
    steps:
      - name: Download release notes artifact
        uses: actions/download-artifact@v4
        with:
          name: release-notes
          path: .

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-macos
          path: release-assets/macos

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-windows
          path: release-assets/windows

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: Resume Designer ${{ needs.prepare.outputs.version }}
          body_path: release-notes.md
          files: |
            release-assets/macos/**/*
            release-assets/windows/**/*
          fail_on_unmatched_files: true
          overwrite_files: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
